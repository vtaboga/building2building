# @package _global_
# Evaluate reactive controllers on all buildings (Section 5, Appendix E.1)
name: eval_reactive_control

building_types:
  - OfficeSmall
  - OfficeMedium
  - RetailStandalone
  - RestaurantFastFood
  - Warehouse
  - SingleFamilyHouse

split: test
run_periods: [full_year]
max_buildings_per_type: null
tasks: [task_const_e0, task_const_emed, task_const_ehigh, task_occ_e0, task_occ_emed, task_occ_ehigh, task_rand_e0, task_rand_emed, task_rand_ehigh]
n_runs: 1
output_csv: ${base_dir}/b2b/baseline_returns/baseline_returns.csv

save_trajectories: false
plot_trajectories: false
trajectory_dir: ${base_dir}/b2b/baseline_returns/trajectories
plot_dir: ${base_dir}/b2b/baseline_returns/plots
