# @package _global_
# Train per-building SAC specialists (companion to train_ppo.yaml).
name: train_sac

defaults:
  - override /policy: sac
  - override /training: sac

building_types:
  - OfficeSmall
  - OfficeMedium
  - RetailStandalone
  - RestaurantFastFood
  - Warehouse
  - SingleFamilyHouse

split: test
buildings_per_type: 8
building_ids: null
run_period: full_year  # one of full_year / winter / summer
# Normalized-reward presets (NormalizedDeadbandReward with per-bucket tau_T/tau_E
# from reward_normalizers.yaml).  energy_weight=0 (e0 suffix)
# focuses the policy purely on thermal comfort; switch to emed/ehigh to add an
# energy penalty.  The three modes cover constant, occupancy, and random-schedule
# temperature targets.
tasks: [task_const_e0, task_occ_e0, task_rand_e0]

training:
  total_timesteps: 2_000_000
  n_envs: 4
