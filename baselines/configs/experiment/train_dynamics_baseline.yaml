# @package _global_
# Multi-building baseline without augmentation (Section 6.1)
name: dynamics_baseline

defaults:
  - override /policy: ppo
  - override /reward: task_const_e0
  - override /training: default

difficulty: easy
approach: baseline

training:
  total_timesteps: 4_000_000
  n_envs: 16

env:
  pad_obs_to: 20
  normalize_obs: true
  augment_params: false
