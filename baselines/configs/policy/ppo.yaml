# Paper PPO hyperparameters (Table 5)
algorithm: ppo
policy_type: MlpPolicy
device: auto

learning_rate: 5.0e-5
batch_size: 336
n_steps: 672
n_epochs: 5
target_kl: 0.02
gamma: 0.98
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

policy_kwargs:
  net_arch:
    pi: [256, 256]
    vf: [256, 256]
  activation_fn: Tanh
  ortho_init: true
  log_std_init: -1.0
