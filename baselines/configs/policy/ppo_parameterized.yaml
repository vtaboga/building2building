# PPO for parameterized multi-building training (larger net, Appendix E.3)
algorithm: ppo
policy_type: MlpPolicy
device: auto

learning_rate: 3.0e-4
batch_size: 64
n_steps: 16384
n_epochs: 10
target_kl: 0.02
gamma: 0.95
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

policy_kwargs:
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]
  activation_fn: Tanh
  ortho_init: true
  log_std_init: -1.0
