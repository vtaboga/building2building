name: Test

on:
  pull_request:
    branches: [dev]

jobs:
  test:
    name: pytest -m quick (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (test + training extras)
        run: pip install -e ".[test,training]"

      - name: Run quick test suite
        run: pytest -m quick -q
